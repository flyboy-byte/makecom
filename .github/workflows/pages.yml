name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it midway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install "markdown==3.10.2"

      - name: Build site
        run: python3 site/build.py

      - name: Check for unrewritten internal links
        run: |
          if grep -rEo 'href="\.{0,2}/?[^":]*\.md"' _site/*.html; then
            echo "::error::Found internal .md links that were not rewritten to .html"
            exit 1
          fi
          echo "No dead internal links."

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
